name: Run Hello World Agent

on:
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Open Agent Spec CLI
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Run hello-world agent from spec
        run: |
          oas run --spec .agents/hello-world-agent.yaml \
            --task greet \
            --input '{"name": "GitHub Actions"}'

