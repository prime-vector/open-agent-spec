name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short --junitxml=test-results.xml --cov=oas_cli --cov-report=term-missing --cov-report=xml

      - name: Ruff (check + format)
        run: |
          ruff check . --exclude test_output/
          ruff format --check . --exclude test_output/

      - name: Mypy
        run: |
          mypy oas_cli tests

      - name: Integration tests (templates)
        run: |
          python tests/integration/test_templates.py

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            test-results.xml
            coverage.xml
            test_output/
          retention-days: 7

  conformance:
    name: conformance (python + node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python runtime
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Build npm runtime
        working-directory: npm
        run: |
          npm ci
          npm run build

      - name: Run conformance suite (both runtimes)
        run: |
          python -m spec.conformance.harness.harness \
            --adapter python --adapter node \
            --matrix-out conformance-matrix.md \
            --json-out conformance-report.json

      - name: Upload conformance matrix
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: conformance-matrix
          path: |
            conformance-matrix.md
            conformance-report.json
          retention-days: 30
