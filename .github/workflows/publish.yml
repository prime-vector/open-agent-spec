name: Publish to PyPI

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    environment:
      name: pypi
      url: https://pypi.org/project/open-agent-spec/

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build tomli

      - name: Verify version matches tag (only if ref is a v* tag)
        shell: bash
        run: |
          set -euo pipefail
          REF="${GITHUB_REF}"

          if [[ "$REF" == refs/tags/v* ]]; then
            TAG_VERSION="${REF#refs/tags/v}"
            PYPROJECT_VERSION="$(python -c "import tomli; print(tomli.load(open('pyproject.toml', 'rb'))['project']['version'])")"
            if [[ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]]; then
              echo "Version in pyproject.toml ($PYPROJECT_VERSION) does not match tag version ($TAG_VERSION)"
              exit 1
            fi
          else
            echo "Not running on a v* tag ($REF); skipping tag/version verification."
          fi

      - name: Build package
        run: python -m build

      - name: Publish to PyPI (OIDC / Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1