# Spec §3 — A minimal valid document MUST be accepted.
description: "Minimal valid spec document is accepted"
spec_section: "3.2"

spec: |
  open_agent_spec: "1.4.0"
  agent:
    name: minimal
    description: minimal valid agent
  intelligence:
    type: llm
    engine: openai
    model: gpt-4o
  tasks:
    greet:
      description: say hello
      input:
        type: object
        properties:
          name: { type: string }
        required: [name]
      output:
        type: object
        properties:
          response: { type: string }
        required: [response]
      prompts:
        system: "You greet people."
        user: "{{ name }}"

mock_responses:
  greet: '{"response": "Hello Alice!"}'

invoke:
  task: greet
  input: { name: "Alice" }

expect:
  result.task: greet
  result.output.response: "Hello Alice!"
