# Spec §7.2 — Circular dependency chains MUST raise CHAIN_CYCLE_ERROR before any LLM call.
description: "Circular depends_on chain raises CHAIN_CYCLE_ERROR"
spec_section: "7.2"

spec: |
  open_agent_spec: "1.5.0"
  agent:
    name: test
    description: test
  intelligence:
    type: llm
    engine: openai
    model: gpt-4o
  tasks:
    a:
      description: task a
      depends_on: [b]
      output:
        type: object
        properties:
          x: { type: string }
    b:
      description: task b
      depends_on: [a]
      output:
        type: object
        properties:
          y: { type: string }

mock_responses: {}

invoke:
  task: a
  input: {}

expect_error:
  code: CHAIN_CYCLE_ERROR
  stage: routing
