# Spec §7.2 — Cycle detection MUST scale to DAGs with shared subgraphs.
# A 2-wide lattice of stacked diamonds has 2^N root-to-base paths. A
# recursion-stack-only DFS walks every path (~10^12 at 40 levels — an
# effective hang); tracking fully-explored nodes makes the check linear.
# Only the apex's direct deps execute — transitive deps are declared, not
# executed — so this case isolates the cycle-check itself.
description: "Deep diamond lattice (2^40 paths) — cycle check must be linear, not per-path"
spec_section: "7.2"
requires: depends-on

