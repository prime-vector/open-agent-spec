# Spec §11.2 — Unknown depends_on reference MUST raise TASK_NOT_FOUND.
description: "Unknown task in depends_on raises TASK_NOT_FOUND"
spec_section: "11.2"

spec: |
  open_agent_spec: "1.4.0"
  agent:
    name: test
    description: test
  intelligence:
    type: llm
    engine: openai
    model: gpt-4o
  tasks:
    final:
      description: depends on non-existent task
      depends_on: [nonexistent]
      output:
        type: object
        properties:
          x: { type: string }

mock_responses: {}

invoke:
  task: final
  input: {}

expect_error:
  code: TASK_NOT_FOUND
  stage: routing
