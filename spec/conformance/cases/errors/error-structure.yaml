# Spec §11.1 — Error objects MUST contain error, code, and stage fields.
description: "Error objects have required structure fields"
spec_section: "11.1"

spec: |
  open_agent_spec: "1.5.0"
  agent:
    name: test
    description: test
  intelligence:
    type: llm
    engine: openai
    model: gpt-4o
  tasks:
    greet:
      description: say hello
      input:
        type: object
        properties:
          name: { type: string }
        required: [name]

mock_responses: {}

invoke:
  task: greet
  input: {}

expect_error:
  code: CHAIN_INPUT_MISSING
  has_fields: [error, code, stage, task]
