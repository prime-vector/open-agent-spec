# Spec §11.2 — Unknown task name MUST raise TASK_NOT_FOUND.
description: "Unknown task name raises TASK_NOT_FOUND"
spec_section: "11.2"

spec: |
  open_agent_spec: "1.5.0"
  agent:
    name: test
    description: test
  intelligence:
    type: llm
    engine: openai
    model: gpt-4o
  tasks:
    greet:
      description: say hello

mock_responses: {}

invoke:
  task: nonexistent_task
  input: {}

expect_error:
  code: TASK_NOT_FOUND
  stage: routing
