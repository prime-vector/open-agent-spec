# Helper spec used as a delegation target by test cases in this directory.
# Not a test case itself.
open_agent_spec: "1.5.0"

agent:
  name: delegated-agent
  description: target for delegation tests

intelligence:
  type: llm
  engine: openai
  model: gpt-4o

tasks:
  summarise:
    description: summarise input
    input:
      type: object
      properties:
        text: { type: string }
      required: [text]
    output:
      type: object
      properties:
        summary: { type: string }
      required: [summary]
    prompts:
      system: "Summarise concisely."
      user: "{{ text }}"
