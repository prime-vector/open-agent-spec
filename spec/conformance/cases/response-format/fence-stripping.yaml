# Spec §8.1 — Markdown code fences MUST be stripped before JSON parsing.
description: "Markdown code fences are stripped before JSON parsing"
spec_section: "8.1"

spec: |
  open_agent_spec: "1.5.0"
  agent:
    name: test
    description: test
  intelligence:
    type: llm
    engine: openai
    model: gpt-4o
  tasks:
    analyse:
      description: analyse
      input:
        type: object
        properties:
          q: { type: string }
        required: [q]
      output:
        type: object
        properties:
          answer: { type: string }
        required: [answer]
      prompts:
        system: "Analyse."
        user: "{{ q }}"

mock_responses:
  analyse: "```json\n{\"answer\": \"fenced\"}\n```"

invoke:
  task: analyse
  input: { q: "test" }

expect:
  result.output.answer: "fenced"
