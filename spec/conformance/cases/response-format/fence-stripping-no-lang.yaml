# Spec §8.1 — Fences without language tag MUST also be stripped.
description: "Code fences without language tag are stripped"
spec_section: "8.1"

spec: |
  open_agent_spec: "1.4.0"
  agent:
    name: test
    description: test
  intelligence:
    type: llm
    engine: openai
    model: gpt-4o
  tasks:
    analyse:
      description: analyse
      input:
        type: object
        properties:
          q: { type: string }
        required: [q]
      output:
        type: object
        properties:
          answer: { type: string }
        required: [answer]
      prompts:
        system: "Analyse."
        user: "{{ q }}"

mock_responses:
  analyse: "```\n{\"answer\": \"plain fence\"}\n```"

invoke:
  task: analyse
  input: { q: "test" }

expect:
  result.output.answer: "plain fence"
