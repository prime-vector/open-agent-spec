# Spec §7.1 — JSON output parsing MUST return whatever the JSON parser yields,
# including top-level scalars (numbers, booleans), not their string form.
description: "JSON scalar responses are returned as parsed scalars"
spec_section: "7.1"

spec: |
  open_agent_spec: "1.5.0"
  agent:
    name: test
    description: test
  intelligence:
    type: llm
    engine: openai
    model: gpt-4o
  tasks:
    count_items:
      description: return a number
      prompts:
        system: ""
        user: "count_items"

mock_responses:
  count_items: '42'

invoke:
  task: count_items
  input: {}

expect:
  result.task: count_items
  result.output: 42
