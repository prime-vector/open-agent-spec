# Spec §8.1 — Default response_format is "json"; output is parsed as JSON.
description: "Default response_format parses output as JSON"
spec_section: "8.1"

spec: |
  open_agent_spec: "1.5.0"
  agent:
    name: test
    description: test
  intelligence:
    type: llm
    engine: openai
    model: gpt-4o
  tasks:
    analyse:
      description: analyse
      input:
        type: object
        properties:
          q: { type: string }
        required: [q]
      output:
        type: object
        properties:
          answer: { type: string }
          confidence: { type: number }
        required: [answer, confidence]
      prompts:
        system: "Analyse."
        user: "{{ q }}"

mock_responses:
  analyse: '{"answer": "yes", "confidence": 0.95}'

invoke:
  task: analyse
  input: { q: "Is the sky blue?" }

expect:
  result.output.answer: "yes"
  result.output.confidence: 0.95
