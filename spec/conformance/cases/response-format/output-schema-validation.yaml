# Spec §6.3 — Output MUST be validated against the output schema for JSON format.
description: "Output missing required schema fields raises an error"
spec_section: "6.3"

spec: |
  open_agent_spec: "1.5.0"
  agent:
    name: test
    description: test
  intelligence:
    type: llm
    engine: openai
    model: gpt-4o
  tasks:
    analyse:
      description: analyse
      input:
        type: object
        properties:
          q: { type: string }
        required: [q]
      output:
        type: object
        properties:
          answer: { type: string }
          confidence: { type: number }
        required: [answer, confidence]
      prompts:
        system: "Analyse."
        user: "{{ q }}"

mock_responses:
  # Missing required "confidence" field
  analyse: '{"answer": "yes"}'

invoke:
  task: analyse
  input: { q: "test" }

expect_error:
  code: OUTPUT_SCHEMA_ERROR
  stage: output_validation
