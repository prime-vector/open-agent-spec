# Spec §9.1 — Global fallback (priority 4) is used when no other source provides a prompt.
description: "Global prompts used when task has no inline prompts"
spec_section: "9.1"

spec: |
  open_agent_spec: "1.5.0"
  agent:
    name: test
    description: test
  intelligence:
    type: llm
    engine: openai
    model: gpt-4o
  tasks:
    greet:
      description: say hello
      input:
        type: object
        properties:
          name: { type: string }
        required: [name]
      output:
        type: object
        properties:
          response: { type: string }
        required: [response]
  prompts:
    system: "global fallback system"
    user: "global fallback {{ name }}"

mock_responses:
  greet: '{"response": "ok"}'

invoke:
  task: greet
  input: { name: "Alice" }

expect:
  result.prompt_contains_all:
    - "global fallback system"
    - "global fallback Alice"
