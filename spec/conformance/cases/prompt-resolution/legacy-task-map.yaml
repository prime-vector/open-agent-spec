# Spec §9.1 — Legacy per-task map (priority 3) beats global fallback.
description: "Legacy per-task prompt map beats global fallback"
spec_section: "9.1"

spec: |
  open_agent_spec: "1.5.0"
  agent:
    name: test
    description: test
  intelligence:
    type: llm
    engine: openai
    model: gpt-4o
  tasks:
    greet:
      description: say hello
      input:
        type: object
        properties:
          name: { type: string }
        required: [name]
      output:
        type: object
        properties:
          response: { type: string }
        required: [response]
  prompts:
    system: "global fallback system"
    user: "global fallback {{ name }}"
    greet:
      system: "legacy map system"
      user: "legacy map {{ name }}"

mock_responses:
  greet: '{"response": "ok"}'

invoke:
  task: greet
  input: { name: "Alice" }

expect:
  result.prompt_contains_all:
    - "legacy map system"
    - "legacy map Alice"
  result.prompt_not_contains_all:
    - "global fallback system"
