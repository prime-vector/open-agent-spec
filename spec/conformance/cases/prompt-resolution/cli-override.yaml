# Spec §9.1 — CLI override (priority 1) beats all other prompt sources.
description: "CLI override system and user prompts take highest priority"
spec_section: "9.1"

spec: |
  open_agent_spec: "1.5.0"
  agent:
    name: test
    description: test
  intelligence:
    type: llm
    engine: openai
    model: gpt-4o
  tasks:
    greet:
      description: say hello
      input:
        type: object
        properties:
          name: { type: string }
        required: [name]
      output:
        type: object
        properties:
          response: { type: string }
        required: [response]
      prompts:
        system: "per-task system"
        user: "per-task {{ name }}"
  prompts:
    system: "global system"
    user: "global {{ name }}"

mock_responses:
  greet: '{"response": "ok"}'

invoke:
  task: greet
  input: { name: "Alice" }
  override_system: "cli system override"
  override_user: "cli user override"

expect:
  result.prompt_contains: "cli system override"
  result.prompt_contains_all:
    - "cli system override"
    - "cli user override"
  result.prompt_not_contains_all:
    - "per-task system"
    - "global system"
