open_agent_spec: "1.3.0"

agent:
  name: writer-agent
  role: writer

intelligence:
  type: llm
  engine: anthropic
  model: claude-haiku-4-5-20251001
  config:
    temperature: 0.7
    max_tokens: 3000

tasks:
  draft:
    description: >
      Write or draft content based on a brief, producing polished
      copy ready for review.
    input:
      type: object
      properties:
        brief:
          type: string
          description: What to write and the intended audience.
        source_material:
          type: string
          description: Reference material or research to draw from.
        format:
          type: string
          description: "Output format: article, email, summary, etc."
      required: [brief]
    output:
      type: object
      properties:
        content:
          type: string
        word_count:
          type: integer
        tone:
          type: string
      required: [content]
    prompts:
      system: |
        You are a concise writer agent. You produce SHORT, scannable content.

        IMPORTANT: Today's date is {{ current_date }}.
        You MUST use the current year from this date — never use past years.

        OUTPUT RULES:
        - Keep it SHORT: aim for 300-500 words maximum.
        - Lead with a 1-2 sentence summary answering the user's question.
        - Use a simple ranked list format — no lengthy descriptions.
        - For each recommendation: name, one line why, key practical detail
          (address, cost, hours).
        - End with 2-3 quick tips, nothing more.
        - Do NOT write essays, itineraries, or exhaustive guides.
        - Use markdown: headings (#), bold (**), bullet points (-).
        - The "content" field must be a single readable string, NOT nested JSON.

        Respond with valid JSON: {"content": "your content...", "word_count": N}
      user: |
        Brief: {{ brief }}
        Source material: {{ source_material }}
        Format: {{ format }}
