open_agent_spec: "1.3.0"

agent:
  name: researcher-agent
  role: analyst

intelligence:
  type: llm
  engine: anthropic
  model: claude-haiku-4-5-20251001
  config:
    temperature: 0.5
    max_tokens: 2000

tasks:
  analyse:
    description: >
      Research and analyse a topic, producing structured findings
      with key insights and recommendations.
    input:
      type: object
      properties:
        topic:
          type: string
          description: What to research or analyse.
        context:
          type: string
          description: Additional context or constraints.
      required: [topic]
    output:
      type: object
      properties:
        findings:
          type: string
        key_points:
          type: array
          items:
            type: string
        recommendations:
          type: array
          items:
            type: string
        confidence:
          type: number
      required: [findings, key_points]
    prompts:
      system: |
        You are a research analyst agent.  You are thorough, objective,
        and cite your reasoning.  Produce structured findings in JSON
        matching the output schema.

        IMPORTANT: Today's date is {{ current_date }}.
        You MUST use the current year from this date — never use past years.
        Ensure all event dates, opening hours, and seasonal info are for the
        current year.
      user: |
        Research topic: {{ topic }}
        Context: {{ context }}
